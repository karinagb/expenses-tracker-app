<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header><h1>Expenses Tracker</h1></header>
    <main>
      <div class="forms">
        <form class="newIncome">
          <h2>New income</h2>
          <label for="incomeName">Description</label>
          <input name="incomeName" id="incomeName" />
          <label for="incomeDate">Date</label>
          <input type="date" name="incomeDate" id="incomeDate"/>
          <label for="incomeValue">Amount ($)</label>
          <input name="incomeValue" id="incomeValue" />
          <button type="submit">Add Income</button>
        </form>

        <form class="newExpense">
          <h2>New expense</h2>
          <label for="expenseName">Description</label>
          <input name="expenseName" id="expenseName" />
          <label for="expenseDate">Date</label>
          <input type="date" name="expenseDate" id="expenseDate" />
          <label for="expenseValue">Amount ($)</label>
          <input name="expenseValue" id="expenseValue" />
          <button type="submit">Add Expense</button>
        </form>
      </div>

      <div class="history">
        <h1>History</h1>
        <div class="tableWrapper">
          <table>
            <thead>
              <th scope="col">Transaction</th>
              <th scope="col">Date</th>
              <th scope="col">Amount</th>
              <th scope="col">Actions</th>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="balance">
        <h1>Balance</h1>
        <p class="balanceValue">$0</p>
      </div>
      <button class="clearButton" name="clear">Clear all data</button>
    </main>
    <footer>Two Dev</footer>
    <script src="script.js"></script>
  </body>
</html>
